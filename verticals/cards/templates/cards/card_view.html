<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A birthday card for {{ card.recipient_name }}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,700&family=Quicksand:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #f5f0eb;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 20px;
    font-family: 'Quicksand', sans-serif;
    color: #2a2a2a;
  }

  .card-frame {
    width: 340px;
    height: 440px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
    margin-bottom: 28px;
  }

  .card-frame iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }

  .message-panel {
    width: 340px;
    background: white;
    border-radius: 12px;
    padding: 28px 28px 32px;
    box-shadow: 0 6px 24px rgba(0, 0, 0, 0.06);
    text-align: left;
  }

  .salutation {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 22px;
    margin-bottom: 14px;
    color: #2a2a2a;
  }

  .message-body {
    font-family: 'Quicksand', sans-serif;
    font-size: 16px;
    line-height: 1.55;
    color: #3a3a3a;
    white-space: pre-wrap;
  }

  .footer {
    margin-top: 36px;
    font-family: 'Quicksand', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #999;
  }

  .footer a {
    color: #999;
    text-decoration: none;
    border-bottom: 1px dotted #ccc;
  }

  .footer a:hover { color: #555; }
</style>
</head>
<body>
  <div class="card-frame">
    <iframe src="/cards/designs/{{ card.design_id }}" title="Card design" loading="eager"></iframe>
  </div>

  <div class="message-panel">
    <div class="salutation">Dear {{ card.recipient_name }},</div>
    <div class="message-body">{{ card.card_message }}</div>
  </div>

  <div class="footer">
    Sent via <a href="/">YC-Concierge</a>
  </div>
</body>
</html>
